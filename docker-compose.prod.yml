version: "2.4"

services:
  mysql:
    image: mysql:8.0
    container_name: resume-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    mem_limit: 650m
    cpus: 1.0
    pids_limit: 200
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [data]

  backend:
    build:
      context: ./backed-resume
      args:
        DEBIAN_MIRROR: ${DEBIAN_MIRROR:-}
    container_name: resume-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      FRONTEND_URL: ${FRONTEND_URL}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SYSTEM_CONFIG_MASTER_KEY: ${SYSTEM_CONFIG_MASTER_KEY}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      EMAIL_CODE_SECRET: ${EMAIL_CODE_SECRET}
      EMAIL_ALLOW_DEV_CODE: ${EMAIL_ALLOW_DEV_CODE}
      AI_ENABLED: ${AI_ENABLED}
      AI_PROVIDER: ${AI_PROVIDER}
      AI_EXECUTION_ENGINE: ${AI_EXECUTION_ENGINE}
      OPENAI_API_URL: ${OPENAI_API_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      AGENT_SERVICE_URL: ${AGENT_SERVICE_URL}
      AGENT_REQUEST_TIMEOUT_MS: ${AGENT_REQUEST_TIMEOUT_MS}
      AGENT_INTERNAL_SECRET: ${AGENT_INTERNAL_SECRET}
      RAG_STRICT_SOURCES: ${RAG_STRICT_SOURCES}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_REGION: ${R2_REGION}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-headless-shell
    mem_limit: 600m
    cpus: 1.5
    pids_limit: 300
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 20
    networks: [app, data]

  web:
    build:
      context: ./fronted-resume-web
      args:
        VITE_API_BASE: /api
        VITE_USE_MOCK: "false"
    container_name: resume-web
    restart: unless-stopped
    mem_limit: 96m
    cpus: 0.5
    pids_limit: 100
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [app]

  admin:
    build:
      context: ./middle-resume
      args:
        VITE_API_BASE_URL: /api
        VITE_APP_ENV: production
        VITE_DEBUG: "false"
        VITE_USE_MOCK: "false"
        VITE_BASE: /admin/
    container_name: resume-admin
    restart: unless-stopped
    mem_limit: 96m
    cpus: 0.5
    pids_limit: 100
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [app]

  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: resume-proxy
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.5
    pids_limit: 100
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    depends_on:
      web:
        condition: service_healthy
      admin:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"
    volumes:
      - ./deploy/nginx/resume-system.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --no-check-certificate --spider https://127.0.0.1/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [public, app]

  agent:
    build:
      context: ./python-agent
    container_name: resume-agent
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_started
    environment:
      AGENT_EXECUTION_MODE: ${AGENT_EXECUTION_MODE}
      AGENT_INTERNAL_SECRET: ${AGENT_INTERNAL_SECRET}
      OPENAI_API_URL: ${OPENAI_API_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      RAG_ENABLED: ${RAG_ENABLED}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      FASTEMBED_CACHE_PATH: /models/fastembed
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS}
      RAG_MIN_SCORE: ${RAG_MIN_SCORE}
      RAG_CANDIDATE_LIMIT: ${RAG_CANDIDATE_LIMIT}
      RAG_DENSE_WEIGHT: ${RAG_DENSE_WEIGHT}
      RAG_LEXICAL_WEIGHT: ${RAG_LEXICAL_WEIGHT}
      RAG_STRICT_SOURCES: ${RAG_STRICT_SOURCES}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import json,urllib.request; j=json.load(urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)); raise SystemExit(0 if j.get('status') == 'ok' else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 20
    volumes:
      - fastembed_models:/models/fastembed
    mem_limit: 650m
    cpus: 1.5
    pids_limit: 250
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks: [app, data]

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: resume-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    mem_limit: 300m
    cpus: 1.0
    pids_limit: 150
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks: [data]

volumes:
  mysql_data:
  backend_uploads:
  qdrant_data:
  fastembed_models:

networks:
  public:
  app:
  data:
    internal: true
