version: "2.4"

services:
  mysql:
    image: ${MYSQL_IMAGE:?MYSQL_IMAGE is required}
    container_name: resume-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      # Keep deterministic headroom below the 448 MiB cgroup limit. The
      # application does not consume Performance Schema, while its default
      # instrumentation and caches are expensive on the 2 GiB production host.
      - --performance-schema=OFF
      - --innodb-buffer-pool-size=192M
      - --innodb-buffer-pool-chunk-size=64M
      - --max-connections=80
      - --table-open-cache=400
      - --table-definition-cache=400
      - --thread-cache-size=16
      - --temptable-max-ram=64M
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    # Keep the aggregate hard limit below a 2 GiB host. Runtime bursts are
    # absorbed by the required host swap instead of allowing one service to
    # starve the Docker daemon and SSH.
    mem_limit: 448m
    cpus: 1.0
    pids_limit: 200
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [data]

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    container_name: resume-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      FRONTEND_URL: ${FRONTEND_URL}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SYSTEM_CONFIG_MASTER_KEY: ${SYSTEM_CONFIG_MASTER_KEY}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      EMAIL_CODE_SECRET: ${EMAIL_CODE_SECRET}
      EMAIL_ALLOW_DEV_CODE: ${EMAIL_ALLOW_DEV_CODE}
      AI_ENABLED: ${AI_ENABLED}
      AI_PROVIDER: ${AI_PROVIDER}
      AI_EXECUTION_ENGINE: ${AI_EXECUTION_ENGINE}
      OPENAI_API_URL: ${OPENAI_API_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      AGENT_SERVICE_URL: ${AGENT_SERVICE_URL}
      AGENT_REQUEST_TIMEOUT_MS: ${AGENT_REQUEST_TIMEOUT_MS}
      KNOWLEDGE_AGENT_REQUEST_TIMEOUT_MS: ${KNOWLEDGE_AGENT_REQUEST_TIMEOUT_MS:-300000}
      AGENT_INTERNAL_SECRET: ${AGENT_INTERNAL_SECRET}
      RAG_STRICT_SOURCES: ${RAG_STRICT_SOURCES}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_REGION: ${R2_REGION}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-headless-shell
    mem_limit: 512m
    cpus: 1.5
    pids_limit: 300
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 20
    networks: [app, data]

  web:
    image: ${WEB_IMAGE:?WEB_IMAGE is required}
    container_name: resume-web
    restart: unless-stopped
    mem_limit: 64m
    cpus: 0.5
    pids_limit: 100
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [app]

  admin:
    image: ${ADMIN_IMAGE:?ADMIN_IMAGE is required}
    container_name: resume-admin
    restart: unless-stopped
    mem_limit: 64m
    cpus: 0.5
    pids_limit: 100
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [app]

  reverse-proxy:
    image: ${NGINX_IMAGE:?NGINX_IMAGE is required}
    container_name: resume-proxy
    restart: unless-stopped
    mem_limit: 64m
    cpus: 0.5
    pids_limit: 100
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    depends_on:
      web:
        condition: service_healthy
      admin:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --header='Host: 121.43.208.184' --spider http://127.0.0.1/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [public, app]

  agent:
    image: ${AGENT_IMAGE:?AGENT_IMAGE is required}
    container_name: resume-agent
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_started
    environment:
      AGENT_EXECUTION_MODE: ${AGENT_EXECUTION_MODE}
      AGENT_INTERNAL_SECRET: ${AGENT_INTERNAL_SECRET}
      AI_PROVIDER: ${AI_PROVIDER}
      OPENAI_API_URL: ${OPENAI_API_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      RAG_ENABLED: ${RAG_ENABLED}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      # Keep this stable path visible to both PID 1 and later docker exec
      # bootstrap/recovery processes. The entrypoint atomically points it at
      # the immutable model-artifact version directory.
      FASTEMBED_CACHE_PATH: /models/fastembed/current
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS}
      RAG_MIN_SCORE: ${RAG_MIN_SCORE}
      RAG_CANDIDATE_LIMIT: ${RAG_CANDIDATE_LIMIT}
      RAG_DENSE_WEIGHT: ${RAG_DENSE_WEIGHT}
      RAG_LEXICAL_WEIGHT: ${RAG_LEXICAL_WEIGHT}
      RAG_STRICT_SOURCES: ${RAG_STRICT_SOURCES}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import json,urllib.request; j=json.load(urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)); raise SystemExit(0 if j.get('status') == 'ok' else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 20
    volumes:
      - fastembed_models:/models/fastembed
    mem_limit: 512m
    cpus: 1.5
    pids_limit: 250
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks: [app, data]

  qdrant:
    image: ${QDRANT_IMAGE:?QDRANT_IMAGE is required}
    container_name: resume-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    mem_limit: 256m
    cpus: 1.0
    pids_limit: 150
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks: [data]

volumes:
  mysql_data:
  backend_uploads:
  qdrant_data:
  fastembed_models:

networks:
  public:
  app:
  data:
    internal: true
