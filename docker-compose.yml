services:
  mysql:
    image: mysql:8.0
    container_name: resume-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me-root}
      MYSQL_DATABASE: ${DB_DATABASE:-resume_system}
      MYSQL_USER: ${DB_USERNAME:-resume_app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me-db}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backed-resume
    container_name: resume-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      agent:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173,http://localhost:3030}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: ${DB_USERNAME:-resume_app}
      DB_PASSWORD: ${DB_PASSWORD:-change-me-db}
      DB_DATABASE: ${DB_DATABASE:-resume_system}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      EMAIL_CODE_SECRET: ${EMAIL_CODE_SECRET:-}
      EMAIL_ALLOW_DEV_CODE: ${EMAIL_ALLOW_DEV_CODE:-false}
      OPENAI_API_URL: ${OPENAI_API_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      AI_EXECUTION_ENGINE: ${AI_EXECUTION_ENGINE:-direct}
      AGENT_SERVICE_URL: ${AGENT_SERVICE_URL:-http://agent:8000}
      AGENT_INTERNAL_SECRET: ${AGENT_INTERNAL_SECRET:?AGENT_INTERNAL_SECRET is required}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_REGION: ${R2_REGION:-auto}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 20

  web:
    build:
      context: ./fronted-resume-web
      args:
        VITE_API_BASE: /api
        VITE_USE_MOCK: "false"
    container_name: resume-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-5173}:80"

  admin:
    build:
      context: ./middle-resume
      args:
        VITE_API_BASE_URL: /api
        VITE_APP_ENV: production
        VITE_DEBUG: "false"
        VITE_USE_MOCK: "false"
    container_name: resume-admin
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${ADMIN_PORT:-3030}:80"

  seed-templates:
    build:
      context: ./backed-resume
    profiles:
      - seed
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: ${DB_USERNAME:-resume_app}
      DB_PASSWORD: ${DB_PASSWORD:-change-me-db}
      DB_DATABASE: ${DB_DATABASE:-resume_system}
    command: ["node", "scripts/seed-diverse-templates.js"]

  agent:
    build:
      context: ./python-agent
    container_name: resume-agent
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_started
    environment:
      AGENT_EXECUTION_MODE: ${AGENT_EXECUTION_MODE:-mock}
      AGENT_INTERNAL_SECRET: ${AGENT_INTERNAL_SECRET:?AGENT_INTERNAL_SECRET is required}
      OPENAI_API_URL: ${OPENAI_API_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-deepseek-v4-pro}
      RAG_ENABLED: ${RAG_ENABLED:-true}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-resume_knowledge}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-fastembed}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
      RAG_MIN_SCORE: ${RAG_MIN_SCORE:-0.35}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: resume-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  mysql_data:
  backend_uploads:
  qdrant_data:
